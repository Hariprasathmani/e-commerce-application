<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My Orders - MotoShowroom">
  <title>My Orders - MotoShowroom</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<!-- HEADER -->
<header>
  <div class="container header-inner">
    <a href="landing.html" class="logo">Moto<span>Showroom</span></a>
    <nav class="main-nav" id="main-nav">
      <a href="index.html">Shop</a>
      <a href="orders.html" class="active">My Orders</a>
    </nav>
    <div class="nav-actions">
      <div id="auth-nav-area"></div>
      <button class="cart-btn" onclick="openCart()">🛒 <span class="cart-count">0</span></button>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<main>
  <section class="orders-container">
    <div class="container">
      <div style="margin-bottom:2rem;">
        <h1 style="margin-bottom:0.5rem;">My Orders</h1>
        <p style="color:var(--text-light);">Track all your purchases and order history</p>
      </div>

      <div id="orders-list">
        <div class="skeleton" style="height:120px;margin-bottom:1rem;"></div>
        <div class="skeleton" style="height:120px;margin-bottom:1rem;"></div>
        <div class="skeleton" style="height:120px;"></div>
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="container">
    <div class="footer-bottom">
      <p>© 2025 MotoShowroom. All rights reserved.</p>
    </div>
  </div>
</footer>

<!-- CART PANEL -->
<div class="modal-overlay" id="cart-overlay">
  <div class="cart-panel">
    <div class="cart-header">
      <h2>🛒 Shopping Cart</h2>
      <button class="cart-close" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-body" id="cart-body"></div>
    <div class="cart-footer">
      <div class="cart-totals">
        <div class="cart-row"><span>Subtotal</span><span id="cart-subtotal">$0.00</span></div>
        <div class="cart-row"><span>Tax (10%)</span><span id="cart-tax">$0.00</span></div>
        <div class="cart-row total"><span>Total</span><span id="cart-total-amount">$0.00</span></div>
      </div>
      <button class="btn btn-primary btn-block" onclick="goToCheckout()">Checkout →</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.isLoggedIn()) {
      showToast('Please sign in to view your orders', 'warning');
      setTimeout(() => window.location.href = 'login.html', 1000);
      return;
    }

    const orders = await getUserOrders();
    renderOrders(orders);
  });

  function renderOrders(orders) {
    const list = document.getElementById('orders-list');

    if (!orders || orders.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📦</div>
          <h3>No orders yet</h3>
          <p style="color:var(--text-light);margin-bottom:1.5rem;">You haven't placed any orders yet. Start shopping!</p>
          <a href="index.html" class="btn btn-primary">Shop Now</a>
        </div>`;
      return;
    }

    list.innerHTML = orders.map(order => {
      const items = order.items || [];
      const statusClass = `status-${(order.status || 'pending').toLowerCase()}`;
      const date = order.createdAt ? new Date(order.createdAt).toLocaleDateString('en-US', {
        year:'numeric', month:'long', day:'numeric'
      }) : 'N/A';
      const total = typeof order.total === 'number' ? order.total.toLocaleString('en-US', {minimumFractionDigits:2}) : (order.total || '—');

      return `
        <div class="order-card">
          <div class="order-card-header">
            <div>
              <div class="order-number">Order #${order._id}</div>
              <div class="order-date">${date}</div>
            </div>
            <div style="display:flex;align-items:center;gap:1rem;">
              <span class="order-status ${statusClass}">${order.status || 'Pending'}</span>
              <div class="order-total">$${total}</div>
            </div>
          </div>
          <div class="order-items-preview">
            ${items.slice(0,4).map(item => `
              <img class="order-thumb" src="${item.image || 'https://images.unsplash.com/photo-1558981806-ec527fa84c39?auto=format&fit=crop&w=100&q=60'}"
                   alt="${item.name}" title="${item.name} x${item.quantity}">
            `).join('')}
            ${items.length > 4 ? `<div style="width:50px;height:50px;background:var(--bg-light);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:var(--text-light);font-weight:600;">+${items.length - 4}</div>` : ''}
          </div>
          <div style="font-size:0.85rem;color:var(--text-light);">
            ${items.map(i => `${i.name} × ${i.quantity}`).join(' · ')}
          </div>
          ${order.shippingInfo ? `
            <div style="margin-top:0.75rem;font-size:0.85rem;color:var(--text-light);">
              📦 Shipping to: <strong>${order.shippingInfo.fullName}</strong> — ${order.shippingInfo.city}, ${order.shippingInfo.country || ''}
            </div>` : ''}
        </div>`;
    }).join('');
  }
</script>
</body>
</html>
